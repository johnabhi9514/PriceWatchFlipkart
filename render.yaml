services:
  - type: web
    name: PriceWatchFlipkart
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt && playwright install chromium

    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0

    envVars:
      - key: DB_PATH
        value: /tmp/PriceWatchFlipkart.db
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
