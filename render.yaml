services:
  - type: web
    name: PriceWatchFlipkart
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=/tmp/ms-playwright python -m playwright install chromium

    startCommand: PLAYWRIGHT_BROWSERS_PATH=/tmp/ms-playwright streamlit run app.py --server.port $PORT --server.address 0.0.0.0

    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /tmp/ms-playwright
      - key: DB_PATH
        value: /tmp/PriceWatchFlipkart.db
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false